server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS — resolves upstream per-request
    # so nginx won't crash if backend isn't ready at startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Keep-alive tuning for upstream nginx (host) and API clients
    keepalive_timeout 120s;
    keepalive_requests 1000;

    # Gzip — compress both static files AND proxied API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy to backend
    location /api/ {
        set $backend_upstream http://backend:7889;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # E-commerce path routing (Bu Santi 20 Jul 2026)
    # tbksanti.id/shop/* → bakeshop-ecom container nginx:80
    # `^~` prefix priority (beat regex locations) supaya `/shop/assets/*.css`
    # tidak ke-catch oleh `location ~* \.(js|css...)$` di bawah (yang di-desain
    # untuk POS static assets, bukan ecom).
    location ^~ /shop {
        set $ecom_upstream http://ecom:80;
        proxy_pass $ecom_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR (kalau nanti dev over prod nginx) butuh upgrade header.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Timeout longer untuk Next.js SSR yang first-request bisa lambat.
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        # Override Cache-Control HTML pages supaya Cloudflare + browser tidak
        # cache. Cegah customer buka /shop tapi lihat cached POS SPA.
        # Ecom nginx sudah kirim no-cache untuk index.html, ini defense in depth.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Storage proxy (uploaded files)
    location /storage/ {
        set $backend_upstream http://backend:7889;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker - no cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /sw-push.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
